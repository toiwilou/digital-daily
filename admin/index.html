<!DOCTYPE html>
<html lang="fr">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>ADMIN DIGITAL Daily</title>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha512-iecdLmaskl7CVkqkXNQ/ZH/XLlvWZOJyj7Yy7tcenmpD1ypASozpmT/E0iPtmFIB46ZmdtAc9eNBvH0H/ZpiBw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-LN+7fdVzj6u52u30Kp6M/trliBMCMKTyK833zpbD+pXdCLuTusPj697FH4R/5mcr" crossorigin="anonymous">
        <style>
            .none {
                display: none;
            }
        </style>
    </head>
    <body>
        <div class="connection none p-5">
            <div style="border-radius: 5px; color: #062932ff; background-color: #aadef2ff; width: fit-content; margin: 30px auto; padding: 20px 50px;">
                <h3 style="text-align: center;">Connexion</h3>
            </div>
            <form id="loginForm">
                <div class="form-group mb-4">
                    <label for="email-input">E-mail</label>
                    <input type="email" name="email" id="email" class="form-control" placeholder="E-mail" required>
                </div>
                <div class="form-group mb-4">
                    <label for="password-input">Mot de passe</label>
                    <input type="password" name="password" id="password" class="form-control" placeholder="Mot de passe" required>
                </div>
                <button type="submit" class="btn btn-success">Se connecter</button>
            </form>
            <div id="loginError" class="mt-3 text-danger" style="display:none;"></div>
        </div>
        <div class="content none p-5 bg-light">
            <div id="commandsContainer" class="p-5">
                <h2>Tous les message</h2>
                <div id="commandsList"></div>
            </div>
        </div>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js" integrity="sha384-ndDqU0Gzau9qJ1lfW4pNLlhNTkCfHzAVBReH9diLvGRem5+R9g2FzA8ZGN954O5Q" crossorigin="anonymous"></script>
        <script src="https://cdn.canvasjs.com/canvasjs.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
        <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
        <script>
            const auth = document.querySelector('.connection');
            const content = document.querySelector('.content');

            if (sessionStorage.getItem('connection')) {
                content.classList.remove('none');
                
                if (!auth.classList.contains('none')) {
                    auth.classList.add('none');
                }
            } else {
                auth.classList.remove('none');
                
                if (!content.classList.contains('none')) {
                    content.classList.add('none');
                }
            }

            document.getElementById('loginForm').addEventListener('submit', async function(e) {
                e.preventDefault(); // empêche le reload de la page

                const email = document.getElementById('email').value;
                const password = document.getElementById('password').value;

                try {
                    const response = await fetch('https://api.digital-daily.fr/api/login_check', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            username: email,
                            password: password
                        })
                    });

                    const data = await response.json();

                    if (response.ok) {
                        // Auth réussie : stocker token et rediriger
                        sessionStorage.setItem('connection', true);
                        localStorage.setItem('authToken', data.token); // ou sessionStorage
                        window.location.reload(); // ou rediriger vers le dashboard
                    } else {
                        // Affiche l'erreur renvoyée par l'API
                        document.getElementById('loginError').style.display = 'block';
                        document.getElementById('loginError').innerText = data.message || 'Erreur de connexion';
                    }
                } catch (err) {
                    console.error(err);
                    document.getElementById('loginError').style.display = 'block';
                    document.getElementById('loginError').innerText = 'Impossible de contacter l\'API';
                }
            });

            async function fetchCommands() {
                // Récupère le token stocké lors de la connexion
                const token = localStorage.getItem('authToken');

                if (!token) {
                    console.error('Utilisateur non authentifié');
                    return;
                }

                try {
                    const response = await fetch('https://api.digital-daily.fr/api/commands', {
                        method: 'GET',
                        headers: {
                            'Authorization': 'Bearer ' + token,
                            'Content-Type': 'application/json'
                        }
                    });

                    const data = await response.json();

                    if (!response.ok) {
                        console.error('Erreur API:', data.message);
                        return;
                    }

                    // Affiche les utilisateurs
                    const commandsList = document.getElementById('commandsList');
                    commandsList.innerHTML = ''; // Vide le container avant d'ajouter

                    data.forEach(command => {
                        const div = document.createElement('div');
                        div.classList.add('command-item', 'shadow-sm', 'bg-white', 'm-3', 'p-3');
                        div.innerHTML = `
                            <h4>${command.gender} ${command.firstname} ${command.lastname}</h4>
                            <h6>${command.email}</h6>
                            <p>Rôle : ${command.object}</p>
                            <p>Rôle : ${command.message}</p>
                        `;
                        commandsList.appendChild(div);
                    });

                } catch (err) {
                    console.error('Erreur fetch:', err);
                }
            }

            // Appel de la fonction au chargement
            fetchCommands();
        </script>
    </body>
</html>
